name: Daily AI Digest

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC — single daily run to conserve CI minutes
  workflow_dispatch: # Allows manual trigger from the Actions tab

concurrency:
  group: daily-digest
  cancel-in-progress: false

# Use permissive defaults or explicitly grant contents write permission if needed
permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Important if workflow needs to trigger other workflows, otherwise default GITHUB_TOKEN is fine
          fetch-depth: 1 

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./ai-daily-digest
        run: pip install -r requirements.txt

      - name: Run Digest Script
        working-directory: ./ai-daily-digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/digest.py

      - name: Create pull request for digest updates
        if: github.ref_name == 'main'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/daily-digest
          delete-branch: true
          title: "chore(digest): update daily AI digest"
          commit-message: "chore(digest): update daily AI digest"
          body: |
            Automated daily digest refresh generated by `ai-daily-digest/scripts/digest.py`.

            This switches the digest lane to PR-based updates so it can merge under the repository rules that block direct pushes to `main`.
          labels: |
            jules
          add-paths: |
            ai-daily-digest/data/**
            ai-daily-digest/daily/**
            ai-daily-digest/README.md

      - name: Trigger PR gate workflows
        if: github.ref_name == 'main' && steps.cpr.outputs.pull-request-operation != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_BRANCH: ${{ steps.cpr.outputs.pull-request-branch }}
          BASE_SHA: ${{ github.sha }}
          HEAD_SHA: ${{ steps.cpr.outputs.pull-request-head-sha }}
        run: |
          python3 scripts/dispatch_pr_gate_workflows.py \
            --repo "$REPO" \
            --ref "$PR_BRANCH" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA"
