name: Digest to Intake Bridge

on:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC — 1 hour after daily digest
  workflow_dispatch:

concurrency:
  # Shared queue because multiple scheduled lanes update the same weekly rollup PR branch.
  group: automation-rollup-producer
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install openai

      - name: Run bridge script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/digest_to_intake.py

      - name: Create pull request for intake updates
        if: github.ref_name == 'main'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/weekly-rollup
          delete-branch: true
          title: "chore: automation rollup"
          commit-message: "chore(intake): bridge digest sources"
          body: |
            Automated weekly rollup for repository-maintenance changes.

            This shared PR is refreshed by the scheduled automation lanes during the week and merged by the weekly rollup workflow after it syncs with `main` and re-runs the required checks.
          add-paths: |
            docs/new-sources.md
            docs/new-sources/**

      - name: Trigger PR gate workflows
        if: github.ref_name == 'main' && steps.cpr.outputs.pull-request-operation != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_BRANCH: ${{ steps.cpr.outputs.pull-request-branch }}
          BASE_SHA: ${{ github.sha }}
          HEAD_SHA: ${{ steps.cpr.outputs.pull-request-head-sha }}
        run: |
          python3 scripts/dispatch_pr_gate_workflows.py \
            --repo "$REPO" \
            --ref "$PR_BRANCH" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA"
