name: Vikunja Issue/Task Sync

on:
  issues:
    types: [opened, edited, reopened, closed, labeled, unlabeled]
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch:
    inputs:
      import_unlinked_tasks:
        description: "Import unlinked open Vikunja tasks into GitHub"
        required: false
        default: "false"
      dry_run:
        description: "Run without writing updates"
        required: false
        default: "false"

permissions:
  contents: read
  issues: write

concurrency:
  group: vikunja-sync
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ secrets.VIKUNJA_BASE_URL != '' && secrets.VIKUNJA_API_TOKEN != '' && secrets.VIKUNJA_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run bidirectional Vikunja sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VIKUNJA_BASE_URL: ${{ secrets.VIKUNJA_BASE_URL }}
          VIKUNJA_API_TOKEN: ${{ secrets.VIKUNJA_API_TOKEN }}
          VIKUNJA_PROJECT_ID: ${{ secrets.VIKUNJA_PROJECT_ID }}
          VIKUNJA_SYNC_LABEL: "sync-vikunja"
          VIKUNJA_SYNC_LIMIT: "200"
          VIKUNJA_IMPORT_UNLINKED_TASKS: ${{ github.event.inputs.import_unlinked_tasks || 'false' }}
          VIKUNJA_SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python3 scripts/vikunja_bidirectional_sync.py

  skip-missing-config:
    if: ${{ !(secrets.VIKUNJA_BASE_URL != '' && secrets.VIKUNJA_API_TOKEN != '' && secrets.VIKUNJA_PROJECT_ID != '') }}
    runs-on: ubuntu-latest
    steps:
      - name: Missing secrets
        run: |
          echo "Vikunja sync skipped. Configure secrets:"
          echo "- VIKUNJA_BASE_URL"
          echo "- VIKUNJA_API_TOKEN"
          echo "- VIKUNJA_PROJECT_ID"
