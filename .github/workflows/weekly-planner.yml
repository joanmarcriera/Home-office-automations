name: Weekly Growth Planner

on:
  schedule:
    - cron: "0 2 * * 1"  # Monday 02:00 UTC — single weekly run
  workflow_dispatch:

concurrency:
  group: weekly-growth-planner
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install openai

      - name: Run growth tracker
        run: python scripts/growth_tracker.py

      - name: Update source scores
        run: python scripts/update_source_scores.py

      - name: Create weekly issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/weekly_planner.py

      - name: Create pull request for weekly metrics
        if: github.ref_name == 'main'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/weekly-growth-planner
          delete-branch: true
          title: "chore: weekly growth snapshot"
          commit-message: "chore: weekly growth snapshot"
          body: |
            Automated weekly growth metrics refresh from:
            - `scripts/growth_tracker.py`
            - `scripts/update_source_scores.py`

            This workflow now opens a PR instead of pushing to `main` directly.
          labels: |
            jules
          add-paths: |
            data/growth-metrics.json
            data/source-scores.json
