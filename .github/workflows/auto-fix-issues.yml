name: Auto-Fix Issue

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'autofix')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          pip install aider-chat
          # We need jq to parse gh output
          sudo apt-get install jq

      - name: Create auto-fix branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b auto-fix-issue-$ISSUE_NUMBER

      - name: Run Auto-fix Python Script
        id: autofix
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          OPENROUTER_MODEL: "upstage/solar-pro-3:free"
        run: |
          python scripts/auto_fix.py $ISSUE_NUMBER
          
      - name: Create PR with fixes
        if: steps.autofix.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          set -euo pipefail
          git push -u origin auto-fix-issue-$ISSUE_NUMBER

          pr_body="$(printf "This is an automated fix for #%s generated autonomously by Aider and OpenRouter. Please review the changes.\n\nCloses #%s" "$ISSUE_NUMBER" "$ISSUE_NUMBER")"

          # We check if there are actual diffs so we don't spam empty PRs
          gh pr create \
            --title "fix: automated resolution for issue #$ISSUE_NUMBER" \
            --body "$pr_body" \
            --base main \
            --head auto-fix-issue-$ISSUE_NUMBER \
            || echo "No changes found or PR already exists."

      - name: Fallback to Jules when OpenRouter lane fails
        if: steps.autofix.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label jules || true
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body \
            "OpenRouter auto-fix could not complete this issue in CI. Falling back to Jules (`jules`) for handling."

      # Auto-merge removed — all PRs require human review
