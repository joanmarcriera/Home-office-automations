name: Daily Jules Knowledge Expansion

on:
  schedule:
    - cron: '0 2,9,16 * * *'  # 02:00, 09:00, 16:00 UTC
  workflow_dispatch: # allow manual trigger for testing

concurrency:
  group: daily-jules-knowledge
  cancel-in-progress: false

jobs:
  open-knowledge-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure jules label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! gh api "repos/$REPO/labels/jules" >/dev/null 2>&1; then
            gh label create "jules" \
              --repo "$REPO" \
              --color "1f6feb" \
              --description "Issues queued for Jules automation"
          fi

      - name: Quarantine failed Jules issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 scripts/quarantine_failed_jules_issues.py

      - name: Check for open Jules PRs (throttle)
        id: throttle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          OPEN_PRS=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --json number,title,body,labels,headRefName,author \
            --jq '[.[] | select(
              (.title | test("daily maintenance|daily knowledge|weekly|cross-link|primer|automated resolution"; "i")) or
              ((.body // "") | test("PR created automatically by Jules"; "i")) or
              (.labels[]?.name == "jules") or
              (.headRefName | test("jules|daily-maintenance|daily-knowledge|jules-sprint|weekly-deepen|cross-link|primer|auto-fix"; "i")) or
              (.author.login == "google-labs-jules[bot]")
            )] | length')
          echo "open_prs=$OPEN_PRS" >> "$GITHUB_OUTPUT"
          if [ "$OPEN_PRS" != "0" ]; then
            echo "⏸️ Throttled: $OPEN_PRS open Jules PR(s). Skipping issue creation."
          fi

      - name: Check queue status for knowledge issue creation
        if: steps.throttle.outputs.open_prs == '0'
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TODAY=$(date -u +%Y-%m-%d)
          SLOT=$(date -u +%H%M)

          # Existing daily knowledge automation issues (any date)
          OPEN_KNOWLEDGE=$(gh issue list \
            --repo "$REPO" \
            --label jules \
            --state open \
            --search "Daily Knowledge Expansion -" \
            --json number \
            --jq "length")

          echo "open_knowledge=$OPEN_KNOWLEDGE" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"

          if [ "$OPEN_KNOWLEDGE" != "0" ]; then
            echo "⏸️ Skipping daily expansion: existing open Daily Knowledge Expansion issue detected."
          fi

      - name: Open Jules knowledge issue
        if: steps.throttle.outputs.open_prs == '0' && steps.check.outputs.open_knowledge == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TODAY: ${{ steps.check.outputs.today }}
          SLOT: ${{ steps.check.outputs.slot }}
        run: |
          set -euo pipefail
          cp .github/issue-templates/daily-jules-knowledge.md issue_body.md

          gh issue create \
            --repo "$REPO" \
            --title "Daily Knowledge Expansion - $TODAY $SLOT UTC" \
            --label jules \
            --body-file issue_body.md
