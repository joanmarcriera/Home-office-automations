name: Docs Quality Gates

on:
  pull_request:
  workflow_dispatch:
    inputs:
      base_sha:
        description: "Base commit SHA for diffing changed docs"
        required: true
      head_sha:
        description: "Head commit SHA for diffing changed docs"
        required: false

jobs:
  knowledgeops-contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run KnowledgeOps contract checks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || inputs.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || inputs.head_sha || github.sha }}
        run: |
          if [ -z "$BASE_SHA" ]; then
            echo "::error::BASE_SHA is required."
            exit 1
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA...$HEAD_SHA" | grep '^docs/.*\.md$' || true)"

          if [ -z "$CHANGED_FILES" ]; then
            echo "No Markdown files changed under docs/."
            exit 0
          fi

          echo "Changed docs:"
          echo "$CHANGED_FILES"

          # shellcheck disable=SC2086
          python3 scripts/check_docs_contract.py $CHANGED_FILES

      - name: Reject metadata-only changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || inputs.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || inputs.head_sha || github.sha }}
        run: python3 scripts/check_substantive_changes.py "$BASE_SHA" "$HEAD_SHA"
