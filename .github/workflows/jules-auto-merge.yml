name: Auto-Merge Jules PRs

# Merges Jules PRs automatically once all quality gates pass.
# This is the second stage of the sequential Jules pipeline:
#   1. Issue created → Jules works → PR opened
#   2. Quality gates pass → THIS workflow auto-merges
#   3. Merge triggers next issue creation (via jules-pipeline-trigger.yml)
# Shared weekly automation rollups are handled separately by
# `weekly-automation-rollup-merge.yml`.

on:
  # Try to arm auto-merge as soon as a Jules PR is opened/updated.
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  workflow_run:
    workflows:
      - Docs Quality Gates
      - Docs Link Health
      - Catalog Quality Gates
      - Intake Quality Gates
      - Generated Content Gates
    types: [completed]
  # Re-evaluate whenever a check suite completes on a PR
  check_suite:
    types: [completed]
  # Also trigger on PR review approval (belt-and-suspenders)
  pull_request_review:
    types: [submitted]
  # Manual fallback
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to auto-merge'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: jules-auto-merge
  cancel-in-progress: false

jobs:
  auto-merge:
    if: >-
      github.event_name != 'pull_request' || (
        contains(github.event.pull_request.title, 'daily maintenance') ||
        contains(github.event.pull_request.title, 'daily knowledge') ||
        contains(github.event.pull_request.title, 'jules sprint') ||
        contains(github.event.pull_request.title, 'weekly') ||
        contains(github.event.pull_request.title, 'cross-link') ||
        contains(github.event.pull_request.title, 'primer') ||
        contains(github.event.pull_request.title, 'automated resolution') ||
        github.event.pull_request.user.login == 'google-labs-jules[bot]'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Find mergeable Jules PRs
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          INPUT_PR: ${{ github.event.inputs.pr_number || '' }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_PR" ]; then
            # Manual trigger — use the provided PR number
            echo "pr_numbers=$INPUT_PR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find open PRs created by Jules (branch pattern or author)
          JULES_PRS=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --json number,title,labels,headRefName,author \
            --jq '[.[] | select(
              (.headRefName != "automation/weekly-rollup") and (
              (.title | test("daily maintenance|daily knowledge|weekly|cross-link|primer|automated resolution"; "i")) or
              (.labels[]?.name == "jules") or
              (.headRefName | test("jules|daily-maintenance|daily-knowledge|jules-sprint|weekly-deepen|cross-link|primer|auto-fix"; "i")) or
              (.author.login == "google-labs-jules[bot]")
            ))] | map(.number) | join(",")')

          if [ -z "$JULES_PRS" ]; then
            echo "No open Jules PRs found."
            echo "pr_numbers=" >> "$GITHUB_OUTPUT"
          else
            echo "Found Jules PRs: $JULES_PRS"
            echo "pr_numbers=$JULES_PRS" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-merge passing PRs
        if: steps.find.outputs.pr_numbers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBERS: ${{ steps.find.outputs.pr_numbers }}
        run: |
          set -euo pipefail
          IFS=',' read -ra PRS <<< "$PR_NUMBERS"

          for PR in "${PRS[@]}"; do
            echo "--- Checking PR #$PR ---"

            STATUS=UNKNOWN
            IS_MERGEABLE=UNKNOWN
            for attempt in 1 2 3 4 5; do
              MERGEABLE=$(gh pr view "$PR" --repo "$REPO" --json mergeable,mergeStateStatus \
                --jq '{mergeable: .mergeable, status: .mergeStateStatus}')
              echo "Merge state attempt $attempt: $MERGEABLE"

              STATUS=$(echo "$MERGEABLE" | jq -r '.status')
              IS_MERGEABLE=$(echo "$MERGEABLE" | jq -r '.mergeable')

              if [ "$IS_MERGEABLE" != "UNKNOWN" ] || [ "$STATUS" != "UNKNOWN" ]; then
                break
              fi

              sleep 10
            done

            if [ "$IS_MERGEABLE" != "MERGEABLE" ] && [ "$IS_MERGEABLE" != "UNKNOWN" ]; then
              echo "PR #$PR is not mergeable (state: $IS_MERGEABLE). Skipping."
              continue
            fi

            HEAD_SHA=$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq '.headRefOid')
            REQUIRED_CHECKS=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" \
              --jq '[.check_runs[] | select(.name == "knowledgeops-contract" or .name == "link-check") | {name, status, conclusion}]')
            echo "Required checks: $REQUIRED_CHECKS"

            PRESENT_CHECKS=$(echo "$REQUIRED_CHECKS" | jq 'length')
            FAILING_CHECKS=$(echo "$REQUIRED_CHECKS" | jq '[.[] | select(.status == "completed" and (.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral"))] | length')

            if [ "$FAILING_CHECKS" != "0" ]; then
              echo "PR #$PR has $FAILING_CHECKS failing checks. Skipping."
              continue
            fi

            NON_PASSING=$(echo "$REQUIRED_CHECKS" | jq '[.[] | select(.status != "completed" or (.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral"))] | length')

            if [ "$PRESENT_CHECKS" -lt "2" ]; then
              echo "PR #$PR has only $PRESENT_CHECKS/2 required checks reported so far."
              NON_PASSING=1
            fi

            if [ "$NON_PASSING" = "0" ] && [ "$STATUS" != "BLOCKED" ] && [ "$IS_MERGEABLE" = "MERGEABLE" ]; then
              echo "✅ PR #$PR checks are passing — merging now."
              gh pr merge "$PR" \
                --repo "$REPO" \
                --merge \
                --delete-branch \
                --body "Auto-merged by Jules pipeline after all quality gates passed."
              echo "Merged PR #$PR successfully."
            else
              echo "ℹ️ PR #$PR is still waiting on merge requirements — arming auto-merge."
              gh pr merge "$PR" \
                --repo "$REPO" \
                --merge \
                --auto \
                --delete-branch \
                --body "Auto-merge enabled by Jules pipeline. Will merge when required checks pass."
              echo "Auto-merge armed for PR #$PR."
            fi

            # Only merge ONE PR per run to maintain sequential pipeline
            break
          done
